name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Validate registry
        run: bun run validate:registry

      - name: Build registry
        run: bun run build:registry

      - name: Run tests
        run: bun test

      - name: Build CLI
        run: |
          cd packages/cli
          bun run build

      - name: Build web app
        run: bun run build:web
