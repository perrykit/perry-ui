name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Validate registry
        run: bun run validate:registry

      - name: Build registry
        run: bun run build:registry

      - name: Type check
        run: bun run typecheck
